<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics - NextHire</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const reports = {
            topJobs: [
                { name: 'Frontend Developer', count: 45 },
                { name: 'Backend Developer', count: 36 },
                { name: 'Full Stack Developer', count: 28 },
                { name: 'UX Designer', count: 22 },
                { name: 'Data Analyst', count: 18 }
            ],
            skillMatch: '76%',
            shortlistRatio: '14.5%',
            conversionRate: '8.2%'
        };

        function Sidebar() {
            const menuItems = [
                { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard', file: 'dashboard.html' },
                { id: 'jobs', icon: 'fa-briefcase', label: 'Job Postings', file: 'job-postings.html' },
                { id: 'applications', icon: 'fa-file-alt', label: 'Applications', file: 'applications.html' },
                { id: 'screening', icon: 'fa-user-secret', label: 'Anonymous Screening', file: 'anonymous-screening.html' },
                { id: 'tests', icon: 'fa-clipboard-check', label: 'Skill Tests', file: 'skill-tests.html' },
                { id: 'reports', icon: 'fa-chart-bar', label: 'Reports', file: 'reports.html' }
            ];

            return (
                <aside className="sidebar">
                    <div className="sidebar-header">
<a href="dashboard.html" className="logo">
                            <img src="Next Hire Logo.jpeg" alt="NextHire" style={{width:'40px',height:'40px',borderRadius:'8px',objectFit:'cover'}} />
                            <div className="logo-text">Next<span>Hire</span></div>
                        </a>
                    </div>
                    <nav className="sidebar-nav">
                        <div className="nav-section">
                            <div className="nav-section-title">Main Menu</div>
                            {menuItems.map(item => (
                                <a key={item.id} href={item.file} className={`nav-item ${item.id === 'reports' ? 'active' : ''}`}>
                                    <i className={`fa-solid ${item.icon}`}></i>
                                    <span>{item.label}</span>
                                </a>
                            ))}
                        </div>
                    </nav>
                    <div className="sidebar-footer">
                        <div className="user-info">
                            <div className="user-avatar">HR</div>
                            <div className="user-details">
                                <div className="user-name">HR Admin</div>
                                <div className="user-role">Administrator</div>
                            </div>
                        </div>
                    </div>
                </aside>
            );
        }

        function Header() {
            return (
                <header className="header">
                    <div className="header-left">
                        <div>
                            <h1 className="header-title">Recruitment Reports & Analytics</h1>
                            <p className="header-subtitle">Analyze hiring performance and recruitment statistics.</p>
                        </div>
                    </div>
                    <div className="header-right">
                        <button className="header-icon-btn"><i className="fa-solid fa-bell"></i><span className="badge-count">3</span></button>
                        <button className="header-icon-btn"><i className="fa-solid fa-gear"></i></button>
                    </div>
                </header>
            );
        }

        function Reports() {
            return (
                <div className="page-content fade-in">
                    <div className="reports-header">
                        <div className="export-buttons">
                            <button className="export-btn"><i className="fa-solid fa-file-csv"></i> Export CSV</button>
                            <button className="export-btn"><i className="fa-solid fa-file-excel"></i> Export Excel</button>
                            <button className="export-btn"><i className="fa-solid fa-file-pdf"></i> Download PDF</button>
                        </div>
                    </div>

                    <div className="reports-grid">
                        <div className="report-card">
                            <h3 className="report-card-title">
                                <i className="fa-solid fa-briefcase" style={{ marginRight: '10px', color: 'var(--primary)' }}></i>
                                Top 5 Most Applied Jobs
                            </h3>
                            <div className="chart-bars" style={{ height: '200px' }}>
                                {reports.topJobs.map((job, index) => (
                                    <div key={index} className="chart-bar" style={{ height: `${(job.count / 45) * 100}%` }} data-value={job.count}></div>
                                ))}
                            </div>
                        </div>

                        <div className="report-card">
                            <h3 className="report-card-title">
                                <i className="fa-solid fa-chart-line" style={{ marginRight: '10px', color: 'var(--primary)' }}></i>
                                Monthly Application Trend
                            </h3>
                            <div className="chart-bars" style={{ height: '200px' }}>
                                <div className="chart-bar" style={{ height: '40%' }} data-value="120"></div>
                                <div className="chart-bar" style={{ height: '55%' }} data-value="165"></div>
                                <div className="chart-bar" style={{ height: '70%' }} data-value="210"></div>
                                <div className="chart-bar" style={{ height: '85%' }} data-value="255"></div>
                            </div>
                        </div>

                        <div className="report-card">
                            <h3 className="report-card-title">
                                <i className="fa-solid fa-check-circle" style={{ marginRight: '10px', color: 'var(--success)' }}></i>
                                Average Skill Match Rate
                            </h3>
                            <div className="report-stat-large">
                                <div className="stat-value-large">{reports.skillMatch}</div>
                                <div className="stat-label-large">Average Score</div>
                            </div>
                        </div>

                        <div className="report-card">
                            <h3 className="report-card-title">
                                <i className="fa-solid fa-percentage" style={{ marginRight: '10px', color: 'var(--warning)' }}></i>
                                Shortlist Ratio
                            </h3>
                            <div className="report-stat-large">
                                <div className="stat-value-large">{reports.shortlistRatio}</div>
                                <div className="stat-label-large">Candidates Shortlisted</div>
                            </div>
                        </div>

                        <div className="report-card">
                            <h3 className="report-card-title">
                                <i className="fa-solid fa-arrow-trend-up" style={{ marginRight: '10px', color: 'var(--info)' }}></i>
                                Recruitment Conversion Rate
                            </h3>
                            <div className="report-stat-large">
                                <div className="stat-value-large">{reports.conversionRate}</div>
                                <div className="stat-label-large">Selected from Applications</div>
                            </div>
                        </div>

                        <div className="report-card">
                            <h3 className="report-card-title">
                                <i className="fa-solid fa-star" style={{ marginRight: '10px', color: 'var(--danger)' }}></i>
                                Skill Score Distribution
                            </h3>
                            <div className="chart-bars" style={{ height: '200px' }}>
                                <div className="chart-bar" style={{ height: '60%', background: 'var(--success)' }} data-value="60%"></div>
                                <div className="chart-bar" style={{ height: '80%', background: 'var(--primary)' }} data-value="80%"></div>
                                <div className="chart-bar" style={{ height: '45%', background: 'var(--warning)' }} data-value="45%"></div>
                                <div className="chart-bar" style={{ height: '30%', background: 'var(--danger)' }} data-value="30%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

function App() {
            return (
                <div className="app-container">
                    <Sidebar />
                    <main className="main-content">
                        <Header />
                        <Reports />
                        <Footer />
                    </main>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="footer">
                    <div className="footer-container">
                        <div className="footer-grid">
                            <div className="footer-brand">
                                <div className="footer-logo">
<img src="Next Hire Logo.jpeg" alt="NextHire Logo" className="footer-logo-img" style={{width:'42px',height:'42px',borderRadius:'10px',objectFit:'cover'}} />
                                    <span className="footer-logo-text">NextHire</span>
                                </div>
                                <p>Your gateway to amazing career opportunities.</p>
                            </div>
                            <div className="footer-column"><h4>Quick Links</h4><ul><li><a href="#">Browse Jobs</a></li><li><a href="#">Companies</a></li><li><a href="#">About Us</a></li></ul></div>
                            <div className="footer-column"><h4>Support</h4><ul><li><a href="#">Help Center</a></li><li><a href="#">Privacy Policy</a></li><li><a href="#">Terms</a></li></ul></div>
                            <div className="footer-column"><h4>Contact</h4><ul><li><a href="mailto:hello@nexthire.com">hello@nexthire.com</a></li><li><a href="#">+1 (555) 123-4567</a></li></ul></div>
                        </div>
                        <div className="footer-bottom"><p>© 2024 NextHire. All rights reserved.</p></div>
                    </div>
                </footer>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
