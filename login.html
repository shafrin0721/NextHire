<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NextHire HR Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            padding: 20px;
        }
        .login-container {
            background: var(--white);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .login-logo h1 {
            font-size: 1.8rem;
            color: var(--gray-800);
        }
        .login-logo h1 span {
            color: var(--primary);
        }
        .login-form .form-group {
            margin-bottom: 25px;
        }
        .login-form .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--gray-700);
        }
        .login-form .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .login-form .form-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .login-error {
            background: var(--danger-light);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--gray-500);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        // Users data
        const users = [
            { id: 1, username: 'hradmin', password: 'hr123', name: 'HR Admin', role: 'Administrator', email: 'hr@nexthire.com' },
            { id: 2, username: 'hruser', password: 'user123', name: 'HR User', role: 'HR Manager', email: 'hruser@nexthire.com' }
        ];

        function Login({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                // Simulate API call
                setTimeout(() => {
                    const user = users.find(u => u.username === username && u.password === password);
                    if (user) {
                        // Store session
                        sessionStorage.setItem('hrUser', JSON.stringify(user));
                        onLogin(user);
                    } else {
                        setError('Invalid username or password. Try: hradmin / hr123');
                    }
                    setLoading(false);
                }, 1000);
            };

            return (
                <div className="login-page">
                    <div className="login-container">
                        <div className="login-logo">
                            <img src="Next Hire Logo.jpeg" alt="NextHire" />
                            <h1>Next<span>Hire</span></h1>
                            <p style={{color: '#6c757d', marginTop: '10px'}}>HR Dashboard Login</p>
                        </div>
                        
                        {error && <div className="login-error"><i className="fa-solid fa-circle-exclamation"></i> {error}</div>}
                        
                        <form className="login-form" onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label className="form-label">Username</label>
                                <input 
                                    type="text" 
                                    className="form-input" 
                                    placeholder="Enter your username"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Password</label>
                                <input 
                                    type="password" 
                                    className="form-input" 
                                    placeholder="Enter your password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <button type="submit" className="login-btn" disabled={loading}>
                                {loading ? <><i className="fa-solid fa-spinner fa-spin"></i> Signing in...</> : 'Sign In'}
                            </button>
                        </form>
                        
                        <div className="login-footer">
                            <p>Demo Credentials: <strong>hradmin</strong> / <strong>hr123</strong></p>
                        </div>
                    </div>
                </div>
            );
        }

        // Export for use in main app
        window.Login = Login;
    </script>
</body>
</html>
