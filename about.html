<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - NextHire</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #333; }
        .public-navbar { background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%); padding: 15px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .navbar-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-logo { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; font-size: 1.5rem; font-weight: 700; }
        .navbar-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .navbar-logo span { color: #007BFF; }
        .navbar-links { display: flex; gap: 30px; align-items: center; }
        .navbar-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .navbar-links a:hover { color: #007BFF; }
        .navbar-links .btn-login { background: #007BFF; color: white; padding: 10px 25px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: all 0.3s; }
        .navbar-links .btn-login:hover { background: #0056b3; }
        .navbar-links .btn-hr { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 25px; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .page-content { padding: 120px 20px 60px; max-width: 1200px; margin: 0 auto; }
        .page-header { text-align: center; margin-bottom: 60px; }
        .page-header h1 { font-size: 3rem; color: #0f0f23; margin-bottom: 15px; }
        .page-header p { font-size: 1.2rem; color: #666; }
        .section { margin-bottom: 60px; }
        .section h2 { font-size: 2rem; color: #0f0f23; margin-bottom: 20px; }
        .section p { color: #666; font-size: 1.05rem; line-height: 1.8; }
        .mission-vision { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 60px; }
        .mv-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center; }
        .mv-card i { font-size: 3rem; color: #007BFF; margin-bottom: 20px; }
        .mv-card h3 { font-size: 1.5rem; color: #0f0f23; margin-bottom: 15px; }
        .team-section h2 { text-align: center; margin-bottom: 40px; }
        .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
        .team-card { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .team-card:hover { transform: translateY(-10px); }
        .team-avatar { width: 100px; height: 100px; background: linear-gradient(135deg, #007BFF 0%, #0056b3 100%); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 700; }
        .team-card h4 { color: #0f0f23; margin-bottom: 5px; }
        .team-card p { color: #007BFF; font-weight: 500; }
        .team-card .role { color: #666; font-size: 0.9rem; margin-top: 10px; }
        .culture-section { background: #f8f9fa; padding: 60px; border-radius: 20px; margin-bottom: 60px; }
        .culture-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 30px; }
        .culture-item { text-align: center; padding: 20px; }
        .culture-item i { font-size: 2.5rem; color: #007BFF; margin-bottom: 15px; }
        .culture-item h4 { color: #0f0f23; margin-bottom: 10px; }
        .culture-item p { color: #666; font-size: 0.95rem; }
        .public-footer { background: #0f0f23; color: white; padding: 40px 20px 20px; margin-top: 60px; }
        .footer-container { max-width: 1200px; margin: 0 auto; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        .footer-brand h3 { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; margin-bottom: 20px; }
        .footer-brand h3 span { color: #007BFF; }
        .footer-brand p { color: rgba(255,255,255,0.6); line-height: 1.8; }
        .footer-column h4 { color: white; font-size: 1rem; margin-bottom: 20px; }
        .footer-column ul { list-style: none; }
        .footer-column ul li { margin-bottom: 10px; }
        .footer-column ul li a { color: rgba(255,255,255,0.6); text-decoration: none; }
        .footer-column ul li a:hover { color: #007BFF; }
        .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; text-align: center; color: rgba(255,255,255,0.5); }
        @media (max-width: 768px) {
            .mission-vision, .team-grid, .culture-grid, .footer-grid { grid-template-columns: 1fr; }
            .navbar-links { display: none; }
            .page-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function Navbar() {
            return (
                <nav className="public-navbar">
                    <div className="navbar-container">
                        <a href="index.html" className="navbar-logo"><img src="Next Hire Logo.jpeg" alt="NextHire" /> Next<span>Hire</span></a>
                        <div className="navbar-links">
                            <a href="index.html">Home</a>
                            <a href="jobs.html">Browse Jobs</a>
                            <a href="about.html">About Us</a>
                            <a href="contact.html">Contact</a>
                            <a href="candidate-login.html" className="btn-login">Candidate Login</a>
                            <a href="dashboard.html" className="btn-hr">HR Dashboard</a>
                        </div>
                    </div>
                </nav>
            );
        }
        function About() {
            const team = [
                { name: 'Shafrin', role: 'UI/UX Design & Full Stack', initials: 'S' },
                { name: 'Heli', role: 'Database & QA Testing', initials: 'H' },
                { name: 'Thushalini', role: 'Frontend Development', initials: 'T' },
                { name: 'Sadalu', role: 'Backend Development', initials: 'S' }
            ];
            const culture = [
                { icon: 'fa-heart', title: 'We Care', desc: 'Employee well-being is our priority' },
                { icon: 'fa-lightbulb', title: 'Innovation', desc: 'We embrace new ideas and technologies' },
                { icon: 'fa-users', title: 'Teamwork', desc: 'Collaboration drives our success' }
            ];
            return (
                <div>
                    <Navbar />
                    <div className="page-content">
                        <div className="page-header">
                            <h1>About NextHire</h1>
                            <p>Building the future of recruitment, one connection at a time</p>
                        </div>
                        <div className="section mission-vision">
                            <div className="mv-card">
                                <i className="fa-solid fa-bullseye"></i>
                                <h3>Our Mission</h3>
                                <p>To revolutionize the hiring process by connecting talented individuals with their dream jobs while helping companies find the perfect candidates through innovative technology and fair, skill-based evaluation.</p>
                            </div>
                            <div className="mv-card">
                                <i className="fa-solid fa-eye"></i>
                                <h3>Our Vision</h3>
                                <p>To become the most trusted recruitment platform globally, promoting diversity and eliminating hiring bias through AI-powered anonymous screening and skill-based assessments.</p>
                            </div>
                        </div>
                        <div className="section culture-section">
                            <h2 style={{textAlign:'center'}}>Our Culture</h2>
                            <div className="culture-grid">
                                {culture.map((item, i) => (
                                    <div className="culture-item" key={i}>
                                        <i className={`fa-solid ${item.icon}`}></i>
                                        <h4>{item.title}</h4>
                                        <p>{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="section team-section">
                            <h2>Meet Our Team</h2>
                            <div className="team-grid">
                                {team.map((member, i) => (
                                    <div className="team-card" key={i}>
                                        <div className="team-avatar">{member.initials}</div>
                                        <h4>{member.name}</h4>
                                        <p>{member.role}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <footer className="public-footer">
                        <div className="footer-container">
                            <div className="footer-grid">
                                <div className="footer-brand"><h3><img src="Next Hire Logo.jpeg" style={{width:40,borderRadius:8}} alt="" /> Next<span>Hire</span></h3><p>Building the future of recruitment.</p></div>
                                <div className="footer-column"><h4>Quick Links</h4><ul><li><a href="index.html">Home</a></li><li><a href="jobs.html">Jobs</a></li><li><a href="about.html">About</a></li></ul></div>
                                <div className="footer-column"><h4>Candidates</h4><ul><li><a href="candidate-login.html">Login</a></li><li><a href="jobs.html">Browse Jobs</a></li></ul></div>
                                <div className="footer-column"><h4>Employers</h4><ul><li><a href="dashboard.html">HR Login</a></li><li><a href="dashboard.html">Post Job</a></li></ul></div>
                            </div>
                            <div className="footer-bottom"><p>© 2024 NextHire. All rights reserved.</p></div>
                        </div>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<About />);
    </script>
</body>
</html>
