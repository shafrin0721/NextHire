<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Tests - NextHire</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const tests = [
            { id: 1, name: 'Frontend Technical Test', position: 'Frontend Developer', questions: 20, candidates: 15, avgScore: '78%', status: 'Active' },
            { id: 2, name: 'Backend Logic Test', position: 'Backend Developer', questions: 25, candidates: 12, avgScore: '74%', status: 'Active' },
            { id: 3, name: 'Python Coding Challenge', position: 'Data Analyst', questions: 15, candidates: 8, avgScore: '82%', status: 'Active' },
            { id: 4, name: 'System Design Test', position: 'Full Stack Developer', questions: 30, candidates: 10, avgScore: '71%', status: 'Inactive' }
        ];

        function Sidebar() {
            const menuItems = [
                { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard', file: 'dashboard.html' },
                { id: 'jobs', icon: 'fa-briefcase', label: 'Job Postings', file: 'job-postings.html' },
                { id: 'applications', icon: 'fa-file-alt', label: 'Applications', file: 'applications.html' },
                { id: 'screening', icon: 'fa-user-secret', label: 'Anonymous Screening', file: 'anonymous-screening.html' },
{ id: 'tests', icon: 'fa-clipboard-check', label: 'Skill Tests', file: 'skill-tests.html' },
                { id: 'interviews', icon: 'fa-calendar', label: 'Interviews', file: 'interviews.html' },
                { id: 'reports', icon: 'fa-chart-bar', label: 'Reports', file: 'reports.html' }
            ];

            return (
                <aside className="sidebar">
                    <div className="sidebar-header">
<a href="dashboard.html" className="logo">
                            <img src="Next Hire Logo.jpeg" alt="NextHire" style={{width:'40px',height:'40px',borderRadius:'8px',objectFit:'cover'}} />
                            <div className="logo-text">Next<span>Hire</span></div>
                        </a>
                    </div>
                    <nav className="sidebar-nav">
                        <div className="nav-section">
                            <div className="nav-section-title">Main Menu</div>
                            {menuItems.map(item => (
                                <a key={item.id} href={item.file} className={`nav-item ${item.id === 'tests' ? 'active' : ''}`}>
                                    <i className={`fa-solid ${item.icon}`}></i>
                                    <span>{item.label}</span>
                                </a>
                            ))}
                        </div>
                    </nav>
                    <div className="sidebar-footer">
                        <div className="user-info">
                            <div className="user-avatar">HR</div>
                            <div className="user-details">
                                <div className="user-name">HR Admin</div>
                                <div className="user-role">Administrator</div>
                            </div>
                        </div>
                    </div>
                </aside>
            );
        }

        function Header() {
            return (
                <header className="header">
                    <div className="header-left">
                        <div>
                            <h1 className="header-title">Skill Test Management</h1>
                            <p className="header-subtitle">Create and monitor skill assessments.</p>
                        </div>
                    </div>
                    <div className="header-right">
                        <button className="header-icon-btn"><i className="fa-solid fa-bell"></i><span className="badge-count">3</span></button>
                        <button className="header-icon-btn"><i className="fa-solid fa-gear"></i></button>
                    </div>
                </header>
            );
        }

        function SkillTests() {
            const [showModal, setShowModal] = useState(false);

            return (
                <div className="page-content fade-in">
                    <div className="page-header-compact">
                        <button className="btn btn-primary" onClick={() => setShowModal(true)}>
                            <i className="fa-solid fa-plus"></i> Create New Test
                        </button>
                    </div>

                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Test Name</th>
                                    <th>Related Position</th>
                                    <th>Total Questions</th>
                                    <th>Assigned Candidates</th>
                                    <th>Average Score</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {tests.map(test => (
                                    <tr key={test.id}>
                                        <td><strong>{test.name}</strong></td>
                                        <td>{test.position}</td>
                                        <td>{test.questions}</td>
                                        <td>{test.candidates}</td>
                                        <td>{test.avgScore}</td>
                                        <td><span className={`status-badge ${test.status.toLowerCase()}`}>{test.status}</span></td>
                                        <td>
                                            <button className="btn btn-outline btn-sm">
                                                <i className="fa-solid fa-chart-bar"></i> View Results
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {showModal && (
                        <div className="modal-backdrop" onClick={() => setShowModal(false)}>
                            <div className="modal job-modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2 className="modal-title">Create New Test</h2>
                                    <button className="modal-close" onClick={() => setShowModal(false)}><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="modal-body">
                                    <form className="job-form">
                                        <div className="form-group full-width">
                                            <label className="form-label">Test Name</label>
                                            <input type="text" className="form-input" placeholder="Enter test name" />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Related Position</label>
                                            <select className="form-select"><option>Select Position</option><option>Frontend Developer</option><option>Backend Developer</option></select>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Total Questions</label>
                                            <input type="number" className="form-input" placeholder="20" />
                                        </div>
                                        <div className="form-group full-width">
                                            <label className="form-label">Test Description</label>
                                            <textarea className="form-textarea" rows="3" placeholder="Describe the test"></textarea>
                                        </div>
                                    </form>
                                </div>
                                <div className="modal-footer">
                                    <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Cancel</button>
                                    <button className="btn btn-primary">Create Test</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

function App() {
            return (
                <div className="app-container">
                    <Sidebar />
                    <main className="main-content">
                        <Header />
                        <SkillTests />
                        <Footer />
                    </main>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="footer">
                    <div className="footer-container">
                        <div className="footer-grid">
                            <div className="footer-brand">
                                <div className="footer-logo">
                                    <img src="Next Hire Logo.jpeg" alt="NextHire Logo" className="footer-logo-img" style={{width:'42px',height:'42px',borderRadius:'10px',objectFit:'cover'}} />
                                    <span className="footer-logo-text">NextHire</span>
                                </div>
                                <p>Your gateway to amazing career opportunities.</p>
                            </div>
                            <div className="footer-column"><h4>Quick Links</h4><ul><li><a href="#">Browse Jobs</a></li><li><a href="#">Companies</a></li><li><a href="#">About Us</a></li></ul></div>
                            <div className="footer-column"><h4>Support</h4><ul><li><a href="#">Help Center</a></li><li><a href="#">Privacy Policy</a></li><li><a href="#">Terms</a></li></ul></div>
                            <div className="footer-column"><h4>Contact</h4><ul><li><a href="mailto:hello@nexthire.com">hello@nexthire.com</a></li><li><a href="#">+1 (555) 123-4567</a></li></ul></div>
                        </div>
                        <div className="footer-bottom"><p>© 2024 NextHire. All rights reserved.</p></div>
                    </div>
                </footer>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
