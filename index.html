        }

        .hero-content p {

        }
        
        .hero-buttons {

            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: #007BFF;

            padding: 15px 35px;
            border-radius: 10px;

            font-weight: 600;

            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            border: none;

        }
        
        .btn-secondary {

            border: 2px solid rgba(255,255,255,0.3);

            border-radius: 10px;

            font-weight: 600;

            display: inline-flex;

            gap: 10px;

        .btn-secondary:hover {

            background: rgba(255,255,255,0.1);
        }

        }

            border-radius: 20px;

        @keyframes float {

            background: white;
            padding: 15px 25px;
            border-radius: 12px;

            align-items: center;

        .floating-card.card-1 {

        .floating-card.card-2 {
            bottom: 20%;
            right: -30px;
            animation-delay: 2s;
        }
        
        .floating-card i {
            font-size: 1.5rem;
            color: #007BFF;
        }
        
        .floating-card div {
            font-weight: 600;
            color: #333;
        }
        
        .floating-card small {
            color: #666;
            font-size: 0.8rem;
        }
        
        /* Stats Section */
        .stats-section {
            background: white;
            padding: 60px 20px;
        }
        
        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            text-align: center;
        }
        
        .stat-item h3 {
            font-size: 3rem;
            color: #007BFF;
            margin-bottom: 10px;
        }
        
        .stat-item p {
            color: #666;
            font-size: 1rem;
        }
        
        /* Featured Jobs */
        .featured-jobs {
            background: #f8f9fa;
            padding: 80px 20px;
        }
        
        .section-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .section-header h2 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 15px;
        }
        
        .section-header p {
            color: #666;
            font-size: 1.1rem;
        }
        
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        
        .job-card {

            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;

        .job-card:hover {

            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
        
        .job-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .job-card-icon {
            width: 50px;
            height: 50px;
            background: #e3f2fd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #007BFF;
        }
        
        .job-card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }
        
        .job-card-company {
            color: #666;
            font-size: 0.9rem;
        }
        
        .job-card-details {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .job-card-details span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .job-card-salary {
            font-size: 1.1rem;
            font-weight: 600;
            color: #28a745;
            margin-bottom: 20px;
        }
        
        .job-card-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .job-tag {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .job-card-btn {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .job-card-btn:hover {
            background: #0056b3;
        }
        
        .view-all-jobs {
            text-align: center;
            margin-top: 40px;
        }
        
        /* How It Works */
        .how-it-works {
            background: white;
            padding: 80px 20px;
        }
        
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }
        
        .step-card {
            text-align: center;
            padding: 30px;
        }
        
        .step-number {

            height: 60px;
            background: linear-gradient(135deg, #007BFF 0%, #0056b3 100%);
            color: white;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 auto 20px;
        }
        
        .step-card h3 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }
        
        .step-card p {
            color: #666;
            font-size: 0.9rem;
        }

        .testimonials {
            background: #f8f9fa;
            padding: 80px 20px;

            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        
        .testimonial-card {

            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);

        .testimonial-text {
            color: #666;
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            font-style: italic;
        }
        
        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .testimonial-avatar {
            width: 50px;
            height: 50px;
            background: #007BFF;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .testimonial-info h4 {
            color: #333;
            font-size: 1rem;
        }
        
        .testimonial-info p {
            color: #666;
            font-size: 0.85rem;
        }
        
        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, #007BFF 0%, #0056b3 100%);
            padding: 80px 20px;
            text-align: center;
        }
        
        .cta-section h2 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .cta-section p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        
        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .cta-section .btn-primary {
            background: white;
            color: #007BFF;
        }
        
        .cta-section .btn-primary:hover {
            background: #f0f0f0;
        }
        
        .cta-section .btn-secondary {
            border-color: white;
            color: white;
        }
        
        .cta-section .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }
        
        /* Footer */
        .public-footer {
            background: #0f0f23;
            color: white;
            padding: 60px 20px 20px;
        }
        
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .footer-brand h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .footer-brand h3 span {
            color: #007BFF;
        }
        
        .footer-brand p {
            color: rgba(255,255,255,0.6);
            line-height: 1.8;
        }
        
        .footer-column h4 {
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        
        .footer-column ul {
            list-style: none;
            padding: 0;
        }
        
        .footer-column ul li {
            margin-bottom: 10px;
        }
        
        .footer-column ul li a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .footer-column ul li a:hover {
            color: #007BFF;
        }
        
        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.5);
        }
        
        /* Mobile Responsive */
        @media (max-width: 992px) {
            .hero-container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .hero-buttons {
                justify-content: center;
            }
            
            .hero-image {
                display: none;
            }
            
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .jobs-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .steps-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .testimonials-grid {
                grid-template-columns: 1fr;
            }
            
            .footer-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 576px) {
            .navbar-links {
                display: none;
            }
            
            .hero-content h1 {
                font-size: 2rem;
            }
            
            .jobs-grid {
                grid-template-columns: 1fr;
            }
            
            .steps-grid {
                grid-template-columns: 1fr;
            }
            
            .footer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

        const { useState, useEffect } = React;

        const featuredJobs = [

            { id: 3, title: 'UX Designer', company: 'Creative Studio', location: 'Remote', type: 'Part-Time', salary: '$50,000 - $70,000', tags: ['Figma', 'UI/UX', 'Design'] },
            { id: 4, title: 'Data Analyst', company: 'Analytics Pro', location: 'Colombo', type: 'Full-Time', salary: '$60,000 - $85,000', tags: ['Python', 'SQL', 'Tableau'] },
            { id: 5, title: 'DevOps Engineer', company: 'CloudTech', location: 'Remote', type: 'Full-Time', salary: '$90,000 - $130,000', tags: ['AWS', 'Docker', 'Kubernetes'] },

        function Navbar() {
            return (
                <nav className="public-navbar">
                    <div className="navbar-container">
                        <a href="index.html" className="navbar-logo">
                            <img src="Next Hire Logo.jpeg" alt="NextHire" />
                            Next<span>Hire</span>
                        </a>
                        <div className="navbar-links">
                            <a href="index.html">Home</a>
                            <a href="jobs.html">Browse Jobs</a>
                            <a href="about.html">About Us</a>
                            <a href="contact.html">Contact</a>
                            <a href="candidate-login.html" className="btn-login">Candidate Login</a>
                            <a href="dashboard.html" className="btn-hr">HR Dashboard</a>

        function Hero() {
            return (
                <section className="hero-section">
                    <div className="hero-container">

                            <div className="hero-buttons">

                                    <i className="fa-solid fa-info-circle"></i>
                                    Learn More
                                </a>

                                </div>

        function Stats() {
            const stats = [
                { number: '500+', label: 'Active Jobs' },
                { number: '10,000+', label: 'Candidates Placed' },
                { number: '200+', label: 'Hiring Companies' },
                { number: '95%', label: 'Satisfaction Rate' }
            ];
            
            return (
                <section className="stats-section">
                    <div className="stats-container">
                        {stats.map((stat, index) => (
                            <div className="stat-item" key={index}>
                                <h3>{stat.number}</h3>
                                <p>{stat.label}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }
        
        function FeaturedJobs() {
            const navigateToJob = (jobId) => {
                window.location.href = `job-details.html?id=${jobId}`;
            };
            
            return (
                <section className="featured-jobs">
