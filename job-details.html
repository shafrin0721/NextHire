<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - NextHire</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; }
        .public-navbar { background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%); padding: 15px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .navbar-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-logo { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; font-size: 1.5rem; font-weight: 700; }
        .navbar-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .navbar-logo span { color: #007BFF; }
        .navbar-links { display: flex; gap: 30px; align-items: center; }
        .navbar-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 500; }
        .navbar-links .btn-login { background: #007BFF; color: white; padding: 10px 25px; border-radius: 8px; }
        .page-content { padding: 100px 20px 60px; max-width: 900px; margin: 0 auto; }
        .job-header { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .job-header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .job-title-section h1 { font-size: 2rem; color: #0f0f23; margin-bottom: 10px; }
        .job-company { color: #007BFF; font-size: 1.1rem; font-weight: 500; }
        .job-meta { display: flex; gap: 30px; margin-bottom: 20px; color: #666; }
        .job-meta span { display: flex; align-items: center; gap: 8px; }
        .job-salary { font-size: 1.5rem; color: #28a745; font-weight: 700; margin-bottom: 20px; }
        .apply-button { background: #007BFF; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .apply-button:hover { background: #0056b3; transform: translateY(-2px); }
        .job-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .job-section h2 { font-size: 1.3rem; color: #0f0f23; margin-bottom: 15px; }
        .job-section p { color: #666; line-height: 1.8; margin-bottom: 15px; }
        .job-section ul { color: #666; margin-left: 20px; }
        .job-section ul li { margin-bottom: 10px; }
        .skills-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .skill-tag { background: #e3f2fd; color: #007BFF; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 500; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #007BFF; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .public-footer { background: #0f0f23; color: white; padding: 40px 20px 20px; margin-top: 60px; }
        .footer-container { max-width: 1200px; margin: 0 auto; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        .footer-brand h3 { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; margin-bottom: 20px; }
        .footer-brand h3 span { color: #007BFF; }
        .footer-brand p { color: rgba(255,255,255,0.6); }
        .footer-column h4 { margin-bottom: 20px; }
        .footer-column ul { list-style: none; }
        .footer-column ul li { margin-bottom: 10px; }
        .footer-column ul li a { color: rgba(255,255,255,0.6); text-decoration: none; }
        .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; text-align: center; color: rgba(255,255,255,0.5); }
        @media (max-width: 768px) {
            .job-header-top { flex-direction: column; gap: 20px; }
            .job-meta { flex-wrap: wrap; }
            .footer-grid { grid-template-columns: 1fr; }
            .navbar-links { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const jobData = { id: 1, title: 'Frontend Developer', company: 'TechCorp Inc.', location: 'Remote', type: 'Full-Time', salary: '$80,000 - $120,000', posted: '2 days ago', description: 'We are looking for an experienced Frontend Developer to join our dynamic team. You will be responsible for building and maintaining modern web applications using React and other cutting-edge technologies.', requirements: ['3+ years of experience with React', 'Strong JavaScript and CSS skills', 'Experience with REST APIs', 'Good communication skills', 'Passion for clean code'], skills: ['React', 'JavaScript', 'CSS', 'HTML', 'TypeScript', 'Git'] };
        function Navbar() { return (
            <nav className="public-navbar"><div className="navbar-container"><a href="index.html" className="navbar-logo"><img src="Next Hire Logo.jpeg" alt="NextHire" /> Next<span>Hire</span></a><div className="navbar-links"><a href="index.html">Home</a><a href="jobs.html">Jobs</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="candidate-login.html" className="btn-login">Login</a></div></div></nav>
        ); }
        function JobDetails() { return (
            <div>
                <Navbar />
                <div className="page-content">
                    <a href="jobs.html" className="back-link"><i className="fa-solid fa-arrow-left"></i> Back to Jobs</a>
                    <div className="job-header">
                        <div className="job-header-top">
                            <div className="job-title-section">
                                <h1>{jobData.title}</h1>
                                <p className="job-company">{jobData.company}</p>
                            </div>
                            <button className="apply-button" onClick={() => window.location.href = `apply.html?job=${jobData.id}`}>Apply Now</button>
                        </div>
                        <div className="job-meta">
                            <span><i className="fa-solid fa-location-dot"></i> {jobData.location}</span>
                            <span><i className="fa-solid fa-clock"></i> {jobData.type}</span>
                            <span><i className="fa-solid fa-calendar"></i> Posted {jobData.posted}</span>
                        </div>
                        <div className="job-salary">{jobData.salary}</div>
                    </div>
                    <div className="job-section">
                        <h2>Job Description</h2>
                        <p>{jobData.description}</p>
                    </div>
                    <div className="job-section">
                        <h2>Requirements</h2>
                        <ul>{jobData.requirements.map((r, i) => <li key={i}>{r}</li>)}</ul>
                    </div>
                    <div className="job-section">
                        <h2>Required Skills</h2>
                        <div className="skills-list">{jobData.skills.map((s, i) => <span className="skill-tag" key={i}>{s}</span>)}</div>
                    </div>
                </div>
                <footer className="public-footer"><div className="footer-container"><div className="footer-grid"><div className="footer-brand"><h3><img src="Next Hire Logo.jpeg" style={{width:40,borderRadius:8}} alt="" /> Next<span>Hire</span></h3><p>Your gateway to amazing career opportunities.</p></div><div className="footer-column"><h4>Quick Links</h4><ul><li><a href="index.html">Home</a></li><li><a href="jobs.html">Jobs</a></li></ul></div><div className="footer-column"><h4>Candidates</h4><ul><li><a href="candidate-login.html">Login</a></li></ul></div><div className="footer-column"><h4>Employers</h4><ul><li><a href="dashboard.html">HR Dashboard</a></li></ul></div></div><div className="footer-bottom"><p>© 2024 NextHire. All rights reserved.</p></div></div></footer>
            </div>
        ); }
        ReactDOM.createRoot(document.getElementById('root')).render(<JobDetails />);
    </script>
</body>
</html>
