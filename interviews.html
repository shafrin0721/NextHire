<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Management - NextHire</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <style>
        .page-header-compact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        .page-header-compact .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const initialInterviews = [
            { id: 1, candidateId: 'C-1067', candidateName: 'Mike Johnson', position: 'Full Stack Developer', date: '2024-01-25', time: '10:00 AM', status: 'Scheduled', type: 'Technical', location: 'Google Meet', notes: 'Focus on React and Node.js skills' },
            { id: 2, candidateId: 'C-1045', candidateName: 'Jane Smith', position: 'Backend Developer', date: '2024-01-26', time: '2:00 PM', status: 'Scheduled', type: 'Technical', location: 'Office - Room 301', notes: 'Python and database questions' },
            { id: 3, candidateId: 'C-1089', candidateName: 'Sarah Williams', position: 'DevOps Engineer', date: '2024-01-20', time: '11:00 AM', status: 'Completed', type: 'HR Round', location: 'Office - Room 205', notes: 'Culture fit assessment' },
            { id: 4, candidateId: 'C-1023', candidateName: 'John Doe', position: 'Frontend Developer', date: '2024-01-22', time: '3:30 PM', status: 'Completed', type: 'Technical', location: 'Google Meet', notes: 'CSS and JavaScript focus' },
            { id: 5, candidateId: 'C-1102', candidateName: 'Tom Brown', position: 'Data Analyst', date: '2024-01-18', time: '9:00 AM', status: 'Cancelled', type: 'Technical', location: 'Office - Room 102', notes: 'Candidate requested reschedule' }
        ];

        const candidates = [
            { id: 'C-1023', name: 'John Doe', position: 'Frontend Developer' },
            { id: 'C-1045', name: 'Jane Smith', position: 'Backend Developer' },
            { id: 'C-1067', name: 'Mike Johnson', position: 'Full Stack Developer' },
            { id: 'C-1089', name: 'Sarah Williams', position: 'DevOps Engineer' },
            { id: 'C-1102', name: 'Tom Brown', position: 'Data Analyst' }
        ];

        function Sidebar() {
            const menuItems = [
                { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard', file: 'dashboard.html' },
                { id: 'jobs', icon: 'fa-briefcase', label: 'Job Postings', file: 'job-postings.html' },
                { id: 'applications', icon: 'fa-file-alt', label: 'Applications', file: 'applications.html' },
                { id: 'screening', icon: 'fa-user-secret', label: 'Anonymous Screening', file: 'anonymous-screening.html' },
                { id: 'tests', icon: 'fa-clipboard-check', label: 'Skill Tests', file: 'skill-tests.html' },
                { id: 'interviews', icon: 'fa-calendar', label: 'Interviews', file: 'interviews.html' },
                { id: 'reports', icon: 'fa-chart-bar', label: 'Reports', file: 'reports.html' }
            ];

            return (
                <aside className="sidebar">
                    <div className="sidebar-header">
                        <a href="dashboard.html" className="logo">
                            <img src="Next Hire Logo.jpeg" alt="NextHire" style={{width:'40px',height:'40px',borderRadius:'8px',objectFit:'cover'}} />
                            <div className="logo-text">Next<span>Hire</span></div>
                        </a>
                    </div>
                    <nav className="sidebar-nav">
                        <div className="nav-section">
                            <div className="nav-section-title">Main Menu</div>
                            {menuItems.map(item => (
                                <a key={item.id} href={item.file} className={`nav-item ${item.id === 'interviews' ? 'active' : ''}`}>
                                    <i className={`fa-solid ${item.icon}`}></i>
                                    <span>{item.label}</span>
                                </a>
                            ))}
                        </div>
                    </nav>
                    <div className="sidebar-footer">
                        <div className="user-info">
                            <div className="user-avatar">HR</div>
                            <div className="user-details">
                                <div className="user-name">HR Admin</div>
                                <div className="user-role">Administrator</div>
                            </div>
                        </div>
                    </div>
                </aside>
            );
        }

        function Header() {
            return (
                <header className="header">
                    <div className="header-left">
                        <div>
                            <h1 className="header-title">Interview Management</h1>
                            <p className="header-subtitle">Schedule and track candidate interviews.</p>
                        </div>
                    </div>
                    <div className="header-right">
                        <button className="header-icon-btn"><i className="fa-solid fa-bell"></i><span className="badge-count">3</span></button>
                        <button className="header-icon-btn"><i className="fa-solid fa-gear"></i></button>
                    </div>
                </header>
            );
        }

        function Interviews() {
            const [interviews, setInterviews] = useState(initialInterviews);
            const [showModal, setShowModal] = useState(false);
            const [editingInterview, setEditingInterview] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [viewModal, setViewModal] = useState(null);

            const filteredInterviews = interviews.filter(interview => {
                const matchesSearch = interview.candidateName.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                     interview.candidateId.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesStatus = statusFilter === 'all' || interview.status.toLowerCase() === statusFilter;
                return matchesSearch && matchesStatus;
            });

            const handleSave = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                const interviewData = {
                    id: editingInterview ? editingInterview.id : Date.now(),
                    candidateId: formData.get('candidateId'),
                    candidateName: formData.get('candidateName'),
                    position: formData.get('position'),
                    date: formData.get('date'),
                    time: formData.get('time'),
                    type: formData.get('type'),
                    location: formData.get('location'),
                    notes: formData.get('notes'),
                    status: editingInterview ? editingInterview.status : 'Scheduled'
                };

                if (editingInterview) {
                    setInterviews(interviews.map(i => i.id === editingInterview.id ? interviewData : i));
                } else {
                    setInterviews([...interviews, interviewData]);
                }
                setShowModal(false);
                setEditingInterview(null);
            };

            const handleEdit = (interview) => {
                setEditingInterview(interview);
                setShowModal(true);
            };

            const handleDelete = (id) => {
                if (confirm('Are you sure you want to delete this interview?')) {
                    setInterviews(interviews.filter(i => i.id !== id));
                }
            };

            const updateStatus = (id, newStatus) => {
                setInterviews(interviews.map(i => i.id === id ? { ...i, status: newStatus } : i));
            };

            return (
                <div className="page-content fade-in">
                    <div className="page-header-compact">
                        <button className="btn btn-primary" onClick={() => { setEditingInterview(null); setShowModal(true); }}>
                            <i className="fa-solid fa-plus"></i> Schedule Interview
                        </button>
                    </div>

                    <div className="filter-bar">
                        <div className="filter-search">
                            <i className="fa-solid fa-search"></i>
                            <input 
                                type="text" 
                                placeholder="Search by candidate name or ID..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="filter-group">
                            <label className="filter-label">Status</label>
                            <select className="filter-select" value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)}>
                                <option value="all">All Status</option>
                                <option value="scheduled">Scheduled</option>
                                <option value="completed">Completed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>

                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Candidate</th>
                                    <th>Position</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Type</th>
                                    <th>Location</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredInterviews.map(interview => (
                                    <tr key={interview.id}>
                                        <td>
                                            <strong>{interview.candidateName}</strong>
                                            <br/>
                                            <small style={{color: '#6c757d'}}>{interview.candidateId}</small>
                                        </td>
                                        <td>{interview.position}</td>
                                        <td>{interview.date}</td>
                                        <td>{interview.time}</td>
                                        <td>{interview.type}</td>
                                        <td>{interview.location}</td>
                                        <td>
                                            <span className={`status-badge ${interview.status.toLowerCase()}`}>
                                                {interview.status}
                                            </span>
                                        </td>
                                        <td>
                                            <div className="action-buttons">
                                                <button className="action-btn view" title="View Details" onClick={() => setViewModal(interview)}>
                                                    <i className="fa-solid fa-eye"></i>
                                                </button>
                                                <button className="action-btn edit" title="Edit" onClick={() => handleEdit(interview)}>
                                                    <i className="fa-solid fa-pen"></i>
                                                </button>
                                                <button className="action-btn delete" title="Delete" onClick={() => handleDelete(interview.id)}>
                                                    <i className="fa-solid fa-xmark"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Schedule/Edit Modal */}
                    {showModal && (
                        <div className="modal-backdrop" onClick={() => { setShowModal(false); setEditingInterview(null); }}>
                            <div className="modal job-modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2 className="modal-title">{editingInterview ? 'Edit Interview' : 'Schedule Interview'}</h2>
                                    <button className="modal-close" onClick={() => { setShowModal(false); setEditingInterview(null); }}>
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <form onSubmit={handleSave}>
                                    <div className="modal-body">
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label className="form-label">Candidate ID</label>
                                                <select name="candidateId" className="form-select" defaultValue={editingInterview?.candidateId || ''} required>
                                                    <option value="">Select Candidate</option>
                                                    {candidates.map(c => (
                                                        <option key={c.id} value={c.id}>{c.id}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Candidate Name</label>
                                                <input type="text" name="candidateName" className="form-input" defaultValue={editingInterview?.candidateName || ''} required />
                                            </div>
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label className="form-label">Position</label>
                                                <input type="text" name="position" className="form-input" defaultValue={editingInterview?.position || ''} required />
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Interview Type</label>
                                                <select name="type" className="form-select" defaultValue={editingInterview?.type || 'Technical'}>
                                                    <option>Technical</option>
                                                    <option>HR Round</option>
                                                    <option>Final Round</option>
                                                    <option>Phone Screening</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label className="form-label">Date</label>
                                                <input type="date" name="date" className="form-input" defaultValue={editingInterview?.date || ''} required />
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Time</label>
                                                <input type="time" name="time" className="form-input" defaultValue={editingInterview?.time || ''} required />
                                            </div>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Location</label>
                                            <input type="text" name="location" className="form-input" defaultValue={editingInterview?.location || ''} placeholder="Office Room / Google Meet Link" required />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Notes</label>
                                            <textarea name="notes" className="form-textarea" rows="3" defaultValue={editingInterview?.notes || ''} placeholder="Interview focus areas, questions to ask, etc."></textarea>
                                        </div>
                                    </div>
                                    <div className="modal-footer">
                                        <button type="button" className="btn btn-secondary" onClick={() => { setShowModal(false); setEditingInterview(null); }}>Cancel</button>
                                        <button type="submit" className="btn btn-primary">
                                            {editingInterview ? 'Update Interview' : 'Schedule Interview'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* View Details Modal */}
                    {viewModal && (
                        <div className="modal-backdrop" onClick={() => setViewModal(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: '500px'}}>
                                <div className="modal-header">
                                    <h2 className="modal-title">Interview Details</h2>
                                    <button className="modal-close" onClick={() => setViewModal(null)}>
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <div className="modal-body">
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '15px'}}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #eee', paddingBottom: '10px'}}>
                                            <span style={{color: '#6c757d'}}>Candidate</span>
                                            <strong>{viewModal.candidateName}</strong>
                                        </div>
                                        <div style={{display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #eee', paddingBottom: '10px'}}>
                                            <span style={{color: '#6c757d'}}>Candidate ID</span>
                                            <span>{viewModal.candidateId}</span>
                                        </div>
                                        <div style={{display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #eee', paddingBottom: '10px'}}>
                                            <span style={{color: '#6c757d'}}>Position</span>
                                            <span>{viewModal.position}</span>
                                        </div>
                                        <div style={{display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #eee', paddingBottom: '10px'}}>
                                            <span style={{color: '#6c757d'}}>Date & Time</span>
                                            <span>{viewModal.date} at {viewModal.time}</span>
                                        </div>
                                        <div style={{display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #eee', paddingBottom: '10px'}}>
                                            <span style={{color: '#6c757d'}}>Type</span>
                                            <span>{viewModal.type}</span>
                                        </div>
                                        <div style={{display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #eee', paddingBottom: '10px'}}>
                                            <span style={{color: '#6c757d'}}>Location</span>
                                            <span>{viewModal.location}</span>
                                        </div>
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                            <span style={{color: '#6c757d'}}>Status</span>
                                            <span className={`status-badge ${viewModal.status.toLowerCase()}`}>{viewModal.status}</span>
                                        </div>
                                        {viewModal.notes && (
                                            <div style={{marginTop: '10px'}}>
                                                <span style={{color: '#6c757d', display: 'block', marginBottom: '5px'}}>Notes</span>
                                                <p style={{margin: 0, color: '#333'}}>{viewModal.notes}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="modal-footer" style={{flexDirection: 'column', gap: '10px', alignItems: 'stretch'}}>
                                    <div style={{display: 'flex', gap: '10px'}}>
                                        {viewModal.status === 'Scheduled' && (
                                            <>
                                                <button className="btn btn-success" style={{flex: 1}} onClick={() => { updateStatus(viewModal.id, 'Completed'); setViewModal(null); }}>
                                                    <i className="fa-solid fa-check"></i> Mark Completed
                                                </button>
                                                <button className="btn btn-danger" style={{flex: 1}} onClick={() => { updateStatus(viewModal.id, 'Cancelled'); setViewModal(null); }}>
                                                    <i className="fa-solid fa-xmark"></i> Cancel
                                                </button>
                                            </>
                                        )}
                                    </div>
                                    <button className="btn btn-outline" onClick={() => { handleEdit(viewModal); setViewModal(null); }}>
                                        <i className="fa-solid fa-pen"></i> Edit Interview
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            return (
                <div className="app-container">
                    <Sidebar />
                    <main className="main-content">
                        <Header />
                        <Interviews />
                        <Footer />
                    </main>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="footer">
                    <div className="footer-container">
                        <div className="footer-grid">
                            <div className="footer-brand">
                                <div className="footer-logo">
                                    <img src="Next Hire Logo.jpeg" alt="NextHire Logo" style={{width:'42px',height:'42px',borderRadius:'10px',objectFit:'cover'}} />
                                    <span className="footer-logo-text">NextHire</span>
                                </div>
                                <p>Your gateway to amazing career opportunities.</p>
                            </div>
                            <div className="footer-column">
                                <h4>Quick Links</h4>
                                <ul>
                                    <li><a href="#">Browse Jobs</a></li>
                                    <li><a href="#">Companies</a></li>
                                    <li><a href="#">About Us</a></li>
                                </ul>
                            </div>
                            <div className="footer-column">
                                <h4>Support</h4>
                                <ul>
                                    <li><a href="#">Help Center</a></li>
                                    <li><a href="#">Privacy Policy</a></li>
                                    <li><a href="#">Terms</a></li>
                                </ul>
                            </div>
                            <div className="footer-column">
                                <h4>Contact</h4>
                                <ul>
                                    <li><a href="mailto:hello@nexthire.com">hello@nexthire.com</a></li>
                                    <li><a href="#">+1 (555) 123-4567</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="footer-bottom">
                            <p>© 2024 NextHire. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
