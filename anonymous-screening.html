<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Screening - NextHire</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const candidates = [
            { id: 'C-2045', skillMatch: '88%', experience: '4 Years', education: 'BSc in Computer Science', certifications: 'AWS Certified Developer', testScore: '84%' },
            { id: 'C-2067', skillMatch: '82%', experience: '3 Years', education: 'BSc in Software Engineering', certifications: 'Google UX Certificate', testScore: '80%' },
            { id: 'C-2089', skillMatch: '76%', experience: '5 Years', education: 'BSc in Information Technology', certifications: 'Microsoft Certified', testScore: '74%' },
            { id: 'C-2102', skillMatch: '71%', experience: '2 Years', education: 'BSc in Computer Science', certifications: 'None', testScore: '68%' }
        ];

        function Sidebar() {
            const menuItems = [
                { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard', file: 'dashboard.html' },
                { id: 'jobs', icon: 'fa-briefcase', label: 'Job Postings', file: 'job-postings.html' },
                { id: 'applications', icon: 'fa-file-alt', label: 'Applications', file: 'applications.html' },
                { id: 'screening', icon: 'fa-user-secret', label: 'Anonymous Screening', file: 'anonymous-screening.html' },
{ id: 'tests', icon: 'fa-clipboard-check', label: 'Skill Tests', file: 'skill-tests.html' },
                { id: 'interviews', icon: 'fa-calendar', label: 'Interviews', file: 'interviews.html' },
                { id: 'reports', icon: 'fa-chart-bar', label: 'Reports', file: 'reports.html' }
            ];

            return (
                <aside className="sidebar">
                    <div className="sidebar-header">
<a href="dashboard.html" className="logo">
                            <img src="Next Hire Logo.jpeg" alt="NextHire" style={{width:'40px',height:'40px',borderRadius:'8px',objectFit:'cover'}} />
                            <div className="logo-text">Next<span>Hire</span></div>
                        </a>
                    </div>
                    <nav className="sidebar-nav">
                        <div className="nav-section">
                            <div className="nav-section-title">Main Menu</div>
                            {menuItems.map(item => (
                                <a key={item.id} href={item.file} className={`nav-item ${item.id === 'screening' ? 'active' : ''}`}>
                                    <i className={`fa-solid ${item.icon}`}></i>
                                    <span>{item.label}</span>
                                </a>
                            ))}
                        </div>
                    </nav>
                    <div className="sidebar-footer">
                        <div className="user-info">
                            <div className="user-avatar">HR</div>
                            <div className="user-details">
                                <div className="user-name">HR Admin</div>
                                <div className="user-role">Administrator</div>
                            </div>
                        </div>
                    </div>
                </aside>
            );
        }

        function Header() {
            return (
                <header className="header">
                    <div className="header-left">
                        <div>
                            <h1 className="header-title">Anonymous Candidate Screening</h1>
                            <p className="header-subtitle">Candidate identity is hidden during initial evaluation.</p>
                        </div>
                    </div>
                    <div className="header-right">
                        <button className="header-icon-btn"><i className="fa-solid fa-bell"></i><span className="badge-count">3</span></button>
                        <button className="header-icon-btn"><i className="fa-solid fa-gear"></i></button>
                    </div>
                </header>
            );
        }

        function Screening() {
            const [revealedIds, setRevealedIds] = useState([]);

            const revealIdentity = (id) => {
                if (revealedIds.includes(id)) {
                    setRevealedIds(revealedIds.filter(rid => rid !== id));
                } else {
                    setRevealedIds([...revealedIds, id]);
                }
            };

            return (
                <div className="page-content fade-in">
                    <div className="screening-cards">
                        {candidates.map(candidate => (
                            <div key={candidate.id} className="screening-card">
                                <div className="screening-card-header">
                                    <div className="candidate-id">Candidate ID: {candidate.id}</div>
                                    <div className="skill-match-display">
                                        <span className="skill-match-label">Skill Match:</span>
                                        <span className="skill-match-value">{candidate.skillMatch}</span>
                                    </div>
                                </div>
                                <div className="screening-card-body">
                                    <div className="screening-info">
                                        <div className="info-row">
                                            <span className="info-label">Experience:</span>
                                            <span className="info-value">{candidate.experience}</span>
                                        </div>
                                        <div className="info-row">
                                            <span className="info-label">Education:</span>
                                            <span className="info-value">{candidate.education}</span>
                                        </div>
                                        <div className="info-row">
                                            <span className="info-label">Certifications:</span>
                                            <span className="info-value">{candidate.certifications}</span>
                                        </div>
                                        <div className="info-row">
                                            <span className="info-label">Test Score:</span>
                                            <span className="info-value">{candidate.testScore}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="screening-card-actions">
                                    <button className="btn btn-success btn-sm">Shortlist</button>
                                    <button className="btn btn-danger btn-sm">Reject</button>
                                    <button className="btn btn-outline btn-sm" onClick={() => revealIdentity(candidate.id)}>
                                        <i className={`fa-solid ${revealedIds.includes(candidate.id) ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                        {revealedIds.includes(candidate.id) ? ' Hide Identity' : ' Reveal Identity'}
                                    </button>
                                </div>
                                {revealedIds.includes(candidate.id) && (
                                    <div className="revealed-identity">
                                        <i className="fa-solid fa-user"></i> Identity Revealed: John Doe
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

function App() {
            return (
                <div className="app-container">
                    <Sidebar />
                    <main className="main-content">
                        <Header />
                        <Screening />
                        <Footer />
                    </main>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="footer">
                    <div className="footer-container">
                        <div className="footer-grid">
                            <div className="footer-brand">
                                <div className="footer-logo">
                                    <img src="Next Hire Logo.jpeg" alt="NextHire Logo" className="footer-logo-img" style={{width:'42px',height:'42px',borderRadius:'10px',objectFit:'cover'}} />
                                    <span className="footer-logo-text">NextHire</span>
                                </div>
                                <p>Your gateway to amazing career opportunities.</p>
                            </div>
                            <div className="footer-column"><h4>Quick Links</h4><ul><li><a href="#">Browse Jobs</a></li><li><a href="#">Companies</a></li><li><a href="#">About Us</a></li></ul></div>
                            <div className="footer-column"><h4>Support</h4><ul><li><a href="#">Help Center</a></li><li><a href="#">Privacy Policy</a></li><li><a href="#">Terms</a></li></ul></div>
                            <div className="footer-column"><h4>Contact</h4><ul><li><a href="mailto:hello@nexthire.com">hello@nexthire.com</a></li><li><a href="#">+1 (555) 123-4567</a></li></ul></div>
                        </div>
                        <div className="footer-bottom"><p>© 2024 NextHire. All rights reserved.</p></div>
                    </div>
                </footer>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
