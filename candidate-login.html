<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Login - NextHire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; border-radius: 20px; padding: 50px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
        .login-logo { text-align: center; margin-bottom: 40px; }
        .login-logo img { width: 60px; height: 60px; border-radius: 15px; margin-bottom: 15px; }
        .login-logo h1 { font-size: 1.8rem; color: #333; }
        .login-logo h1 span { color: #007BFF; }
        .login-logo p { color: #666; margin-top: 10px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { border-color: #007BFF; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        .login-btn { width: 100%; padding: 15px; background: #007BFF; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { background: #0056b3; }
        .login-error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
        .login-footer { text-align: center; margin-top: 25px; color: #666; }
        .login-footer a { color: #007BFF; text-decoration: none; font-weight: 500; }
        .back-home { text-align: center; margin-top: 20px; }
        .back-home a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .back-home a:hover { color: white; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="Next Hire Logo.jpeg" alt="NextHire" />
            <h1>Next<span>Hire</span></h1>
            <p>Candidate Portal Login</p>
        </div>
        
        <div class="login-error" id="loginError">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="errorText">Invalid username or password</span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        
        <div class="login-footer">
            Don't have an account? <a href="candidate-register.html">Register here</a>
        </div>
    
    <div class="back-home">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        const candidates = [
            { email: 'john@example.com', password: 'john123', name: 'John Doe' },
            { email: 'jane@example.com', password: 'jane123', name: 'Jane Smith' }
        ];
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const candidate = candidates.find(c => c.email === email && c.password === password);
            
            if (candidate) {
                sessionStorage.setItem('candidate', JSON.stringify(candidate));
                window.location.href = 'candidate-dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('errorText').textContent = 'Invalid email or password. Try: john@example.com / john123';
            }
        });
    </script>
</body>
</html>
